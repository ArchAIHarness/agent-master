# agent-master runtime configuration template.
# Do not put kubeconfig, Token, Cookie, password, certificate, private key, or real secret here.
# Sensitive values must be provided by Kubernetes ServiceAccount, Secret, mounted files,
# environment variables, or an external controlled configuration system.

server:
  port: 3000
  host: 0.0.0.0
  log: info

redis:
  # Internal service address placeholder. Do not put password in url.
  host: redis.agent-runtime.svc.cluster.local
  port: 6379
  db: 0
  key: agent-runtime:user
  # Optional. Empty means Redis AUTH is disabled.
  # If Redis requires password, inject it through Kubernetes Secret or a controlled runtime environment.
  # Example: password: ${REDIS_PASSWORD}
  password: ""

runtime:
  # Headless default: agent-image:latest.
  # OpenSumi variant: use archai/agent-webui:m1 on variants/opensumi-agent-webui.
  image: archai/agent-webui:m1
  ttl: 3600
  # OpenCode service port.
  port: 4096
  workdir: /nas/agent-master/users
  # OpenSumi agent-webui HTTP port. Leave empty on headless variants.
  agentWebuiPort: 3000
  agentWebuiPathPrefix: /webui

init:
  # Root directory where default initialization templates are stored.
  # - AGENTS.md → user workdir AGENTS.md (created if not exists)
  # - opencode.json → user workdir .opencode/opencode.json (created if not exists)
  templatesRoot: ./resources/templates

kubernetes:
  cluster: default
  namespace: agent-runtime
  clusters:
    - name: default
      namespace: agent-runtime
      auth: inCluster
      scheduling:
        enabled: true
        maxRuntime: 100
